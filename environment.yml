name: PDFTranslator
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - pip:
    - typer>=0.9.0
    - rich>=13.0.0
    - beautifulsoup4
    - ebooklib
    - PyMuPDF
    - pdfplumber
    - docling
    - docling-core
    - langchain-core
    - langchain-ollama
    - langchain-google-genai
    - langchain-text-splitters
    - langchain-nvidia-ai-endpoints
    - google-genai
    - google-api-core
    - moviepy
    - pillow
    - pydub
    - nltk
    - sentencepiece
    - transformers
    - rapidfuzz
    - tqdm
    - pytest
    - pytest-cov
