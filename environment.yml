name: PDFTranslator
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # pip-only packages
  - pip:
      - ebooklib>=0.18
      - langchain-nvidia-ai-endpoints>=0.3
      # Install package in development mode with optional dependencies
      - -e .
      - pytest>=8.0
      - pytest-cov>=4.1
      - pytest-asyncio>=0.23
      - ruff>=0.3
      - mypy>=1.9
      - python-dotenv>=1.0
      - httpx>=0.27
      - idna>=3.7
      - shellingham>=0.5
      # Optional: uncomment to install
      # - google-genai>=0.2
      # - google-api-core>=2.0
      # - google-cloud-aiplatform>=1.0
      # - langchain-google-genai>=1.0
      # - ollama>=0.1
      # - langchain-ollama>=0.1
      # - docling>=2.0
      # - sentence-transformers>=3.0
      - typer>=0.9
      - rich>=13.0
      - questionary>=2.0
      - pydantic>=2.0
      - pydantic-settings>=2.0
      - aiosqlite>=0.20
      - sentencepiece>=0.2
      - langchain-core>=0.3
      - langchain-text-splitters>=0.3
      - transformers>=4.40
      - nltk>=3.8
      - fastapi>=0.110
      - uvicorn>=0.27
      - python-multipart>=0.0.9
      - pymupdf>=1.23
      - rapidfuzz>=3.0
      - moviepy>=1.0
      - structlog>=24.1
      - numpy>=1.24
      - beautifulsoup4>=4.12.0