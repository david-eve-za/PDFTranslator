# =============================================================================
# Grafana Datasource Provisioning — Loki
# =============================================================================
# Auto-provisions Loki datasource on Grafana startup
# =============================================================================

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: correlation_id
          matcherRegex: '"correlation_id":"([^"]+)"'
          url: '${__value.raw}'
          datasourceUid: loki
      limits:
        maxLines: 10000
    version: 1