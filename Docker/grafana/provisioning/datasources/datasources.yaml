# Loki Datasource Provisioning
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: "correlation_id"
          matcherRegex: '"correlation_id"\s*:\s*"([^"]+)"'
          url: "$${__value.raw}"
          datasourceUid: "loki"
    version: 1