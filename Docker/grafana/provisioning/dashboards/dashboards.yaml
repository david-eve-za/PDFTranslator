# =============================================================================
# Grafana Dashboard Provisioning
# =============================================================================
# Auto-loads pre-built dashboards on Grafana startup
# =============================================================================

apiVersion: 1

providers:
  - name: 'PDFTranslator Dashboards'
    orgId: 1
    folder: 'PDFTranslator'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards