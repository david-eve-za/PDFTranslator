# =============================================================================
# PDFTranslator — Logstash Pipeline for ELK Stack
# =============================================================================
# Inputs: Beats (Filebeat), HTTP (direct backend logs)
# Filters: JSON parsing, Grok for Nginx, enrichment, field normalization
# Output: Elasticsearch with ILM rollover
# =============================================================================

input {
  # Filebeat (Docker containers + backend logs)
  beats {
    port => 5044
    host => "0.0.0.0"
    client_inactivity_timeout => 300
    add_field => { "[@metadata][source]" => "filebeat" }
  }

  # Direct HTTP from backend (Python logging_loki handler)
  http {
    port => 8080
    host => "0.0.0.0"
    codec => "json"
    threads => 4
    add_field => { "[@metadata][source]" => "http" }
  }
}

filter {
  # ─── Common: Parse @timestamp from various formats ───
  # Note: Filebeat already sends properly formatted @timestamp
  # This filter handles edge cases where timestamp is in different fields
  date {
    match => [ "[@timestamp]", "ISO8601" ]
    target => "@timestamp"
  }

  # ─── Source: Filebeat (Docker JSON logs) ───
  if [@metadata][source] == "filebeat" {
    # Decode JSON from Docker log driver
    if [log] {
      json {
        source => "log"
        target => "parsed"
        remove_field => ["log"]
        skip_on_invalid_json => true
      }
    }

    # Extract structured fields from parsed JSON
    if [parsed] {
      mutate {
        add_field => {
          "correlation_id" => "%{[parsed][correlation_id]}"
          "level" => "%{[parsed][level]}"
          "logger" => "%{[parsed][logger]}"
          "service" => "%{[parsed][service_name]}"
          "message" => "%{[parsed][message]}"
        }
        remove_field => ["parsed"]
      }
    }

    # Normalize level field
    if [level] {
      mutate {
        gsub => ["level", "(?i)^(fatal|critical)$", "CRITICAL"]
        gsub => ["level", "(?i)^(err|error)$", "ERROR"]
        gsub => ["level", "(?i)^(warn|warning)$", "WARN"]
        gsub => ["level", "(?i)^(info|information)$", "INFO"]
        gsub => ["level", "(?i)^(debug|trace)$", "DEBUG"]
      }
    }

    # Docker metadata enrichment
    if [container] {
      mutate {
        add_field => {
          "container_name" => "%{[container][name]}"
          "container_id" => "%{[container][id]}"
          "image_name" => "%{[container][image][name]}"
        }
      }
    }
  }

  # ─── Source: HTTP (Direct backend logs) ───
  if [@metadata][source] == "http" {
    # Backend already sends structured JSON with correlation_id, level, logger, etc.
    mutate {
      rename => {
        "service_name" => "service"
        "logger_name" => "logger"
      }
    }
  }

  # ─── Nginx Access Logs (Grok) ───
  if [type] == "nginx-access" or [component] == "frontend" and [type] == "access" {
    grok {
      match => {
        "message" => '%{IPORHOST:[clientip]} - %{USERNAME:[auth]} \[%{HTTPDATE:[timestamp]}\] "%{WORD:[verb]} %{URIPATHPARAM:[request]} HTTP/%{NUMBER:[httpversion]}" %{NUMBER:[response]} (?:%{NUMBER:[bytes]}|-) "%{URIHOST:[referrer]}" "%{DATA:[agent]}"'
      }
      remove_field => ["message"]
    }

    date {
      match => ["timestamp", "dd/MMM/YYYY:HH:mm:ss Z"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }

    mutate {
      convert => { "response" => "integer" }
      convert => { "bytes" => "integer" }
    }

    # Add classification tags
    if [response] >= 400 and [response] < 500 {
      mutate { add_tag => ["client_error"] }
    } else if [response] >= 500 {
      mutate { add_tag => ["server_error"] }
    }

    mutate {
      add_field => { "service" => "nginx" }
    }
  }

  # ─── Nginx Error Logs ───
  if [type] == "nginx-error" or [component] == "frontend" and [type] == "error" {
    mutate { add_field => { "service" => "nginx" } }
  }

  # ─── Backend Application Logs ───
  if [service] in ["pdftranslator-backend", "backend"] or [logger] =~ /pdftranslator/ {
    mutate {
      add_field => { "service" => "backend" }
      gsub => ["logger", "pdftranslator\.", ""]
    }
  }

  # ─── Correlation ID tagging for traceability ───
  if [correlation_id] {
    mutate { add_tag => ["traced"] }
  }

  # ─── Drop noisy debug logs from healthchecks ───
  if [message] =~ /health/ and [level] == "DEBUG" {
    drop { }
  }

  # ─── GeoIP enrichment (optional - requires GeoIP database) ───
  # if [clientip] and [clientip] !~ /^(127\.0\.0\.1|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.)/ {
  #   geoip {
  #     source => "clientip"
  #     target => "geoip"
  #     database => "/usr/share/logstash/GeoLite2-City.mmdb"
  #   }
  # }
}

output {
  # ─── Elasticsearch with Data Stream / ILM ───
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]

    # Data Stream (recommended for logs)
    data_stream => "true"
    data_stream_type => "logs"
    data_stream_dataset => "pdftranslator"
    data_stream_namespace => "default"

    # Retry
    retry_initial_interval => 2
    retry_max_interval => 64

    # SSL (if enabled)
    # ssl => true
    # ssl_certificate_verification => false
  }

  # ─── Debug: stdout for development ───
  if [@metadata][debug] {
    stdout {
      codec => rubydebug {
        metadata => true
      }
    }
  }
}