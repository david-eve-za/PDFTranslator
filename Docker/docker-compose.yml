# =============================================================================
# PDFTranslator — Complete Docker Compose Stack (with ELK Logging)
# =============================================================================
# Profiles:
#   - prod:  Production stack (backend, frontend, db, elk, admin)
#   - dev:   Development stack with hot reload
#   - logging: ELK stack only (elasticsearch, logstash, filebeat, kibana)
#   - monitoring: Grafana + ELK (legacy, kept for compatibility)
#
# Usage:
#   docker compose --profile prod up -d
#   docker compose --profile dev up -d
#   docker compose --profile logging up -d
# =============================================================================

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16 + pgvector (Official Image) — NO PROFILE (always runs)
  # ─────────────────────────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: pdftranslator_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-translator_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-book_translator}
      POSTGRES_INITDB_ARGS: "--locale=en_US.UTF-8 --encoding=UTF8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=1GB
        -c max_connections=100
        -c wal_level=replica
        -c log_min_duration_statement=1000
        -c log_line_prefix='%t [%p] %u@%d '
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-translator_user} -d ${POSTGRES_DB:-book_translator}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - translator_net
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend API (FastAPI + Uvicorn)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.backend
      target: runtime
    container_name: pdftranslator_backend
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-translator_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-book_translator}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-translator_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-book_translator}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLM__AGENT=${LLM__AGENT:-nvidia}
      - LLM__NVIDIA__MODEL_NAME=${LLM__NVIDIA__MODEL_NAME:-meta/llama-3.1-70b-instruct}
      - LLM__NVIDIA__TEMPERATURE=${LLM__NVIDIA__TEMPERATURE:-0.3}
      - LLM__NVIDIA__TOP_P=${LLM__NVIDIA__TOP_P:-0.95}
      - LLM__NVIDIA__MAX_OUTPUT_TOKENS=${LLM__NVIDIA__MAX_OUTPUT_TOKENS:-4096}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=["http://localhost","http://localhost:80","http://frontend:80"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - translator_net
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    profiles:
      - prod
      - dev

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend Development (Hot Reload)
  # ─────────────────────────────────────────────────────────────────────────────
  backend-dev:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.backend
      target: builder
    container_name: pdftranslator_backend_dev
    restart: unless-stopped
    command: uvicorn pdftranslator.backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-translator_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-book_translator}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-translator_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-book_translator}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLM__AGENT=${LLM__AGENT:-nvidia}
      - LOG_LEVEL=DEBUG
      - CORS_ORIGINS=["http://localhost","http://localhost:4200","http://localhost:8080"]
    ports:
      - "${BACKEND_DEV_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - translator_net
    volumes:
      - ../src:/app/src
      - ../pyproject.toml:/app/pyproject.toml
      - ../README.md:/app/README.md
      - backend_logs:/app/logs
    profiles:
      - dev

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend Production (Nginx + Angular)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.frontend
      target: runtime
    container_name: pdftranslator_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - translator_net
    volumes:
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    profiles:
      - prod

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend Development (ng serve)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-dev:
    build:
      context: ../src/pdftranslator/frontend
      dockerfile: ../../../Docker/Dockerfile.frontend
      target: builder
    container_name: pdftranslator_frontend_dev
    restart: unless-stopped
    command: npx ng serve --host 0.0.0.0 --port 4200 --poll 2000
    ports:
      - "${FRONTEND_DEV_PORT:-4200}:4200"
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
    networks:
      - translator_net
    volumes:
      - ../src/pdftranslator/frontend:/app
      - /app/node_modules
      - /app/dist
    profiles:
      - dev

  # ════════════════════════════════════════════════════════════════════════════════
  # ELK STACK — Logging & Observability
  # ════════════════════════════════════════════════════════════════════════════════
  # Elasticsearch — Search & Analytics Engine
  # ════════════════════════════════════════════════════════════════════════════════
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: pdftranslator_elasticsearch
    restart: unless-stopped
    environment:
      - node.name=pdftranslator-es
      - cluster.name=pdftranslator-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTIC_PORT:-9200}:9200"
    networks:
      - translator_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    profiles:
      - prod
      - logging
      - monitoring

  # ════════════════════════════════════════════════════════════════════════════════
  # Logstash — Log Processing Pipeline
  # ════════════════════════════════════════════════════════════════════════════════
  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: pdftranslator_logstash
    restart: unless-stopped
    command: logstash -f /usr/share/logstash/pipeline/logstash.conf
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logstash/patterns:/usr/share/logstash/patterns:ro
      - backend_logs:/var/log/backend:ro
      - nginx_logs:/var/log/nginx:ro
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
      - XPACK_MONITORING_ENABLED=false
    ports:
      - "5044:5044"   # Beats input
      - "9600:9600"   # Monitoring API
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - translator_net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    profiles:
      - prod
      - logging
      - monitoring

  # ════════════════════════════════════════════════════════════════════════════════
  # Filebeat — Lightweight Log Shipper (Docker Autodiscover)
  # ════════════════════════════════════════════════════════════════════════════════
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.0
    container_name: pdftranslator_filebeat
    restart: unless-stopped
    command: ["--strict.perms=false"]
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - backend_logs:/var/log/backend:ro
      - nginx_logs:/var/log/nginx:ro
    depends_on:
      - logstash
    networks:
      - translator_net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    profiles:
      - prod
      - logging
      - monitoring

  # ════════════════════════════════════════════════════════════════════════════════
  # Kibana — Visualization & Dashboards
  # ════════════════════════════════════════════════════════════════════════════════
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: pdftranslator_kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
      - XPACK_MONITORING_ENABLED=false
      - SERVER_HOST=0.0.0.0
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - translator_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    profiles:
      - prod
      - logging
      - monitoring

  # ─────────────────────────────────────────────────────────────────────────────
  # CloudBeaver — Database Web UI
  # ─────────────────────────────────────────────────────────────────────────────
  admin-panel:
    image: dbeaver/cloudbeaver:latest
    container_name: pdftranslator_cloudbeaver
    restart: unless-stopped
    ports:
      - "${CLOUDBEAVER_PORT:-8978}:8978"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - cloudbeaver_workspace:/opt/cloudbeaver/workspace
    networks:
      - translator_net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    profiles:
      - prod
      - dev

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
  cloudbeaver_workspace:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  translator_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16