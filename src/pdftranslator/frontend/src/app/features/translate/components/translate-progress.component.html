<div class="progress-container">
  @if (progressData(); as data) {
    <div class="progress-header">
      <span class="progress-counter">{{ data.completed_chapters }}/{{ data.total_chapters }}</span>
      <span class="progress-chapter">{{ data.current }}</span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="progressPercentage"></div>
    </div>
  }

  @if (chapterStatuses().size > 0) {
    <div class="chapter-list">
      @for (entry of getChapterEntries(); track entry[0]) {
        <div class="chapter-item" [class]="getStatusClass(entry[1].status)">
          <span class="chapter-icon">{{ getStatusIcon(entry[1].status) }}</span>
          <span class="chapter-title">{{ entry[1].title }}</span>
        </div>
      }
    </div>
  }
</div>
