<div class="progress-container">
  @if (progressData()) {
    <div class="progress-header">
      <span class="progress-counter">{{ progressData().completed_chapters }}/{{ progressData().total_chapters }}</span>
      <span class="progress-chapter">{{ progressData().current }}</span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="progressPercentage"></div>
    </div>
  }

  @if (chapterStatuses().length > 0) {
    <div class="chapter-list">
      @for (ch of chapterStatuses(); track ch.title) {
        <div class="chapter-item" [class]="getStatusClass(ch.status)">
          <span class="chapter-icon">{{ getStatusIcon(ch.status) }}</span>
          <span class="chapter-title">{{ ch.title }}</span>
        </div>
      }
    </div>
  }
</div>
