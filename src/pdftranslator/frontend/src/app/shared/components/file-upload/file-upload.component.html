<div class="file-upload-container">
  <div
    class="drop-zone"
    [class.dragging]="isDragging()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)">
    
    <div class="drop-zone-content" *ngIf="!selectedFile(); else fileSelected">
      <div class="upload-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      
      <p class="drop-text">Drag & drop your file here</p>
      <p class="drop-subtext">or</p>
      
      <label class="file-input-label">
        <input
          type="file"
          accept=".pdf,.epub"
          (change)="onFileInput($event)"
          class="file-input"
        />
        <span class="file-input-button">Browse Files</span>
      </label>
      
      <p class="supported-formats">Supported formats: PDF, EPUB</p>
    </div>

    <ng-template #fileSelected>
      <div class="selected-file">
        <div class="file-info">
          <div class="file-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <div class="file-details">
            <p class="file-name">{{ selectedFile()!.name }}</p>
            <p class="file-size">{{ formatFileSize(selectedFile()!.size) }}</p>
          </div>
        </div>
        <button
          type="button"
          class="remove-file-button"
          (click)="clearFile()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </ng-template>
  </div>

  <div *ngIf="errorMessage()" class="error-message">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span>{{ errorMessage() }}</span>
  </div>
</div>
